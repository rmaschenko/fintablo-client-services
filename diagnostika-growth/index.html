      --slate-500:#64748B; --slate-400:#94A3B8; --slate-300:#CBD5E1; --slate-200:#E2E8F0;

      --loss:#DC2626;   --loss-bg:#FEF2F2;   --loss-border:#FECACA;
      --caution:#D97706;--caution-bg:#FFFBEB;--caution-border:#FDE68A;
      --info:#2563EB;   --info-bg:#EFF6FF;   --info-border:#BFDBFE;

      /* Typography — §9.1 системные стеки, без подгрузки веб-шрифтов */
      --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;

      /* Spacing (4px base) */
      --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px;
      --sp-8:32px; --sp-10:40px; --sp-12:48px; --sp-16:64px; --sp-20:80px;

      /* Radii */
      --radius-sm:4px; --radius-md:8px; --radius-lg:12px; --radius-xl:16px;

      /* Shadows */
      --shadow-sm:0 1px 2px rgba(15,23,42,.05);
      --shadow-md:0 2px 8px rgba(15,23,42,.08);
      --shadow-lg:0 4px 16px rgba(15,23,42,.1);
      --shadow-focus:0 0 0 3px rgba(37,99,235,.2);

      /* Semantic aliases */
      --bg:var(--slate-50);
      --surface:var(--white);
      --text-primary:var(--slate-900);
      --text-secondary:var(--slate-600);
      --text-muted:var(--slate-500);
      --border:var(--slate-200);
      --brand:var(--blue-600);
      --brand-hover:var(--navy-700);
    }

    /* ═══════════════════════════════════════════════════════════
       Reset + базовая типографика
       ═══════════════════════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
    body{
      font-family:var(--font-sans);
      font-size:18px; line-height:1.55;
      color:var(--text-primary);
      background:var(--bg);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    @media (max-width:560px){ body{font-size:16px} }

    img,svg{display:block;max-width:100%}
    a{color:var(--brand);text-decoration:none}
    a:hover{color:var(--brand-hover)}
    button{font:inherit;cursor:pointer;border:0;background:none}

    /* §9.4 Контейнер: max-width 1200, padding 24/16 */
    .container{
      max-width:1200px;
      margin:0 auto;
      padding:0 24px;
    }
    @media (max-width:560px){ .container{padding:0 16px} }

    /* §9.3 Типографика */
    h1{font-size:clamp(32px,4.5vw,56px);line-height:1.1;font-weight:700;letter-spacing:-.02em}
    h2{font-size:clamp(24px,3vw,36px);line-height:1.2;font-weight:700;letter-spacing:-.015em}

    .btn-primary:hover{background:var(--brand-hover);color:var(--white);box-shadow:var(--shadow-lg)}
    .btn-text{color:var(--brand);font-weight:600}
    .btn-text:hover{color:var(--brand-hover);text-decoration:underline}

    .site-footer a:hover{color:var(--white)}
