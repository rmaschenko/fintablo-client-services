<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 36" width="156" height="36" role="img" aria-label="Финтабло">
  <!-- Лого Финтабло для тёмного футера. Структура повторяет официальный
       PNG (Tilda CDN): brand-синий квадрат с буквами «ФТ», текст «Финтабло».
       Цвета: brand #2951CA для значка (как в оригинале), текст белый
       вместо тёмного — единственное отличие под тёмный фон футера. -->
  <rect x="0" y="0" width="36" height="36" rx="8" fill="#2951CA"/>
  <text x="18" y="25.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="-0.04em" text-anchor="middle">ФТ</text>
  <text x="46" y="25" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">Финтабло</text>
</svg>
